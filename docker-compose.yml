
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  auth-service:
    build: ./services/auth-service/auth
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres

  forum-service:
    build: ./services/forum-service/forum
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/forumdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres

  inference-service:
    build: ./services/inference-service
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inferencedb
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FLASK_ENV: production
    depends_on:
      - postgres

  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - forum-service

  frontend:
    build: ./frontend/dermafind
    ports:
      - "3000:80"

volumes:
  pgdata: