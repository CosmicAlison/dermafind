
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  celery-worker:
    build: ./services/inference-service
    command: celery -A app.tasks worker --loglevel=info
    environment:
    - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - redis

  postgres:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  auth-service:
    build: ./services/auth-service/auth
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres

  forum-service:
    build: ./services/forum-service/forum
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/forumdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres

  inference-service:
    build: ./services/inference-service
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inferencedb
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      FLASK_ENV: development
      PYTHONBUFFERED: 1
    depends_on:
      postgres: 
        condition: service_healthy

  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - forum-service
      - inference-service

  frontend:
    build: ./frontend/dermafind
    ports:
      - "3000:80"

volumes:
  pgdata: