worker_processes 1;

events { worker_connections 1024; }

http {
    lua_package_path "/usr/local/openresty/lualib/?.lua;;";

    upstream forum_service {
        server forum-service:8082;
    }

    upstream skin_service {
        server skin-service:8083;
    }

    upstream auth_service {
        server auth-service:8080;
    }

    server {
        listen 80;

        # Route /forum/
        location /forum/ {
            access_by_lua_block {
                local http = require "resty.http"
                local cjson = require "cjson"

                local auth_header = ngx.var.http_authorization
                if not auth_header or auth_header == "" then
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    ngx.say("Missing Authorization header")
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end

                local httpc = http.new()
                local res, err = httpc:request_uri("http://auth_service/auth/me", {
                    method = "GET",
                    headers = { ["Authorization"] = auth_header }
                })

                if not res or res.status ~= 200 then
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    ngx.say("Invalid token")
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end

                local user_info = cjson.decode(res.body)
                local userId = user_info.id
                if not userId then
                    ngx.status = ngx.HTTP_INTERNAL_SERVER_ERROR
                    ngx.say("UserId missing in /me response")
                    return ngx.exit(ngx.HTTP_INTERNAL_SERVER_ERROR)
                end

                ngx.req.set_header("X-User-Id", userId)
            }

            proxy_pass http://forum_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        }
    }
}