worker_processes 1;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/lualib/?.lua;;";
    resolver 127.0.0.11 ipv6=off;

    init_by_lua_block {
        cjson = require "cjson"
        http  = require "resty.http"
    }

    upstream auth_service {
        server auth-service:8080;
    }

    upstream inference_service {
        server inference-service:8083;
    }

    server {
        listen 80;

        client_max_body_size 16M;

        # ---------- GLOBAL CORS ----------
        location /api/ {

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Credentials true always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/me {
            proxy_pass       http://auth_service;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/login {
            proxy_pass       http://auth_service;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/register {
            proxy_pass       http://auth_service;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/refresh {
            proxy_pass       http://auth_service;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            default_type application/json;
            return 200 '{"status":"UP"}';
        }

        location /api/inference/ {

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            add_header Access-Control-Allow-Origin * always;

            access_by_lua_block {

                local auth_header = ngx.var.http_authorization

                if not auth_header then
                    ngx.status = 401
                    ngx.say('{"error":"Unauthorized"}')
                    return ngx.exit(401)
                end

                local httpc = http.new()

                local res = httpc:request_uri(
                    "http://auth-service:8080/api/auth/me",
                    {
                        method = "GET",
                        headers = {
                            ["Authorization"] = auth_header
                        }
                    }
                )

                if not res or res.status ~= 200 then
                    ngx.status = 401
                    ngx.say('{"error":"Invalid token"}')
                    return ngx.exit(401)
                end

                local user = cjson.decode(res.body)

                ngx.req.clear_header("Authorization")
                ngx.req.set_header("X-User-Id", tostring(user.id))
            }

            proxy_pass http://inference_service;
        }
    }
}