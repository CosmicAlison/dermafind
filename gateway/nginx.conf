worker_processes 1;

events { worker_connections 1024; }

http {
    lua_package_path "/usr/local/openresty/lualib/?.lua;;";

    init_by_lua_block {
        cjson = require "cjson"
        http  = require "resty.http"
    }

    upstream forum_service {
        server forum-service:8082;
    }

    upstream auth_service {
        server auth-service:8080;
    }

    server {
        listen 80;

        location /api/auth/login {
            proxy_pass       http://auth_service;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/register {
            proxy_pass       http://auth_service;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/refresh {
            proxy_pass       http://auth_service;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/forum/ {
            access_by_lua_block {
                local auth_header = ngx.var.http_authorization
                if not auth_header or auth_header == "" then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        status  = 401,
                        error   = "Unauthorized",
                        message = "Missing Authorization header"
                    }))
                    return ngx.exit(401)
                end

                local httpc = http.new()
                httpc:set_timeout(3000)

                local res, err = httpc:request_uri("http://auth-service:8080/api/auth/me", {
                    method  = "GET",
                    headers = { ["Authorization"] = auth_header }
                })

                if err then
                    ngx.status = 502
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        status  = 502,
                        error   = "Bad Gateway",
                        message = "Auth service unreachable"
                    }))
                    return ngx.exit(502)
                end

                if res.status == 401 then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        status  = 401,
                        error   = "Unauthorized",
                        message = "Invalid or expired token"
                    }))
                    return ngx.exit(401)
                end

                if res.status ~= 200 then
                    ngx.status = 502
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        status  = 502,
                        error   = "Bad Gateway",
                        message = "Unexpected response from auth service"
                    }))
                    return ngx.exit(502)
                end

                local ok, user = pcall(cjson.decode, res.body)
                if not ok or not user.id then
                    ngx.status = 502
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        status  = 502,
                        error   = "Bad Gateway",
                        message = "Invalid response from auth service"
                    }))
                    return ngx.exit(502)
                end

                ngx.req.clear_header("Authorization")
                ngx.req.set_header("X-User-Id",    tostring(user.id))
                ngx.req.set_header("X-User-Name",  user.username)
                ngx.req.set_header("X-User-Email", user.email)
            }

            proxy_pass       http://forum_service;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            default_type application/json;
            return 200 '{"status":"UP"}';
        }
    }
}